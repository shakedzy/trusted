name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (must match Cargo.toml, e.g. 0.1.0)"
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  validate:
    name: Test and verify version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Resolve release version
        id: version
        run: |
          set -euo pipefail
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          elif [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
            VERSION="${VERSION#v}"
            TAG="v${VERSION}"
          else
            VERSION="${CARGO_VERSION}"
            TAG="v${VERSION}"
          fi
          if [ "${VERSION}" != "${CARGO_VERSION}" ]; then
            echo "Version mismatch: release ${VERSION} != Cargo.toml ${CARGO_VERSION}" >&2
            exit 1
          fi
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver version: ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Releasing ${TAG} (Cargo.toml ${CARGO_VERSION})"

      - name: Reject duplicate tag or release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          git fetch --tags --force
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Git tag ${TAG} already exists." >&2
            exit 1
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${TAG} already exists." >&2
            exit 1
          fi
          echo "Version ${TAG} is available for release."

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all

  build:
    name: Build (${{ matrix.asset_name }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: trusted-linux-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: trusted-macos-arm64
          - os: macos-14
            target: x86_64-apple-darwin
            asset_name: trusted-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p trusted

      - name: Package archive
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          ASSET_NAME: ${{ matrix.asset_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          PKG="trusted-v${VERSION}-${TARGET}"
          mkdir -p "dist/${PKG}"
          cp "target/${TARGET}/release/trusted" "dist/${PKG}/trusted"
          cp LICENSE README.md config.example.toml "dist/${PKG}/"
          chmod +x "dist/${PKG}/trusted"
          tar -czf "dist/${ASSET_NAME}.tar.gz" -C dist "${PKG}"
          if command -v sha256sum >/dev/null; then
            (cd dist && sha256sum "${ASSET_NAME}.tar.gz" > "${ASSET_NAME}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${ASSET_NAME}.tar.gz" | awk '{print $1 "  " $2}' > "${ASSET_NAME}.tar.gz.sha256")
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}.*
          if-no-files-found: error

  release:
    name: Draft GitHub release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find dist -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp -t release-assets {} +
          (cd release-assets && sha256sum *.tar.gz > SHA256SUMS)
          ls -la release-assets/

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: trusted ${{ needs.validate.outputs.version }}
          draft: true
          generate_release_notes: true
          files: release-assets/*
          body: |
            ## Install

            1. Download the `.tar.gz` for your platform below and verify with `SHA256SUMS`.
            2. Extract and install the binary:
               ```bash
               tar -xzf trusted-linux-x86_64.tar.gz   # or trusted-macos-arm64 / trusted-macos-x86_64
               cd trusted-v${{ needs.validate.outputs.version }}-*/
               chmod +x trusted
               sudo mv trusted /usr/local/bin/   # or ~/.local/bin
               trusted setup
               ```
            3. Add shims to your shell `PATH` (printed by `trusted setup`):
               ```bash
               export PATH="$HOME/.trusted/shims:$PATH"
               ```
            4. Copy [config.example.toml](config.example.toml) to `~/.config/trusted/config.toml` if needed.

            ## Commands

            - `trusted setup` — install PATH shims
            - `trusted doctor` — verify install
            - `trusted check pypi:pkg@1.2.3` — check one package
            - `trusted scan` — scan lockfiles in the repo

            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for details.
